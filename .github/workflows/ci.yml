name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Static analysis: lint + typecheck. Cheap, fail-fast.
  # ───────────────────────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ───────────────────────────────────────────────────────────────────────────
  # Unit tests + coverage threshold (enforced in jest.config.ts).
  # ───────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Jest with coverage
        run: npm run test:coverage -- --ci --runInBand

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Production build smoke — proves Next.js build succeeds with current code.
  # Uses placeholder env vars so validation passes; we don't run the server.
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      NEXTAUTH_SECRET: ci-build-secret-placeholder-must-be-32chars-min
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: '1'
      # New prod-required env vars added for production hardening. CI only
      # needs them to satisfy env validation during `next build` — they are
      # never used at runtime in CI.
      RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      RAZORPAY_KEY_SECRET: ci_placeholder_secret
      RAZORPAY_WEBHOOK_SECRET: ci_placeholder_webhook_secret
      SEED_ADMIN_PASSWORD: CiPlaceholder@AdminPass1!
      SEED_CUSTOMER_PASSWORD: CiPlaceholder@CustPass1!
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  # ───────────────────────────────────────────────────────────────────────────
  # E2E smoke (Playwright). Boots the app against a real Postgres service.
  # ───────────────────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: navagunjara
          POSTGRES_PASSWORD: navagunjara
          POSTGRES_DB: navagunjara
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U navagunjara"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://navagunjara:navagunjara@localhost:5432/navagunjara?schema=public
      NEXTAUTH_SECRET: ci-e2e-secret-placeholder-must-be-32chars-minimum
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SEED_ADMIN_PASSWORD: CiAdmin@1234
      SEED_CUSTOMER_PASSWORD: CiCustomer@1234
      RAZORPAY_KEY_ID: rzp_test_ci_placeholder
      RAZORPAY_KEY_SECRET: ci_placeholder_secret
      RAZORPAY_WEBHOOK_SECRET: ci_placeholder_webhook_secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prisma generate + push schema + seed
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
          npm run db:seed

      - name: Run Playwright
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
