name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'output/**'
      - 'package.json'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-dashboard"
  cancel-in-progress: false

jobs:
  build-dashboard:
    name: Build React Dashboard
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests & Generate Coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Generate JSDoc Documentation
        run: npm run docs
        continue-on-error: true

      - name: Build Dashboard
        run: npm run build:client
        env:
          VITE_BASE_PATH: ./
          # Embedded into the static bundle so the "Send Email" button can
          # call workflow_dispatch without prompting the user for a PAT.
          # ⚠️ Visible to anyone who loads the Pages site — use a fine-grained
          # PAT scoped to Actions: write on this repo only.
          VITE_GH_DISPATCH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}

      - name: Generate Fresh Aggregated Report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          DRY_RUN: 'true'
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠️  GH_PAT_TOKEN secret not set — skipping live report generation."
            echo "    Dashboard will deploy with whatever data already exists in output/."
            exit 0
          fi
          echo "🚀 Generating fresh aggregated report (dry-run, no email)..."
          npm run dry-run
        continue-on-error: true

      - name: Generate Reports Index
        run: npm run generate-index
        continue-on-error: true

      - name: Copy Reports to Dashboard Build
        run: |
          mkdir -p dist/reports
          cp output/*.html dist/reports/ 2>/dev/null || echo "No HTML reports found"
          cp output/reports-index.json dist/reports/ 2>/dev/null || echo "No index found"
          cp output/pipeline-health.json dist/reports/ 2>/dev/null || echo "No pipeline health data found"

      - name: Copy Data Files for Static API
        run: |
          mkdir -p dist/data
          cp src/data/repos.json dist/data/
          cp src/data/sections.json dist/data/

      - name: Prefetch GitHub Data for Static Dashboard
        # GH Pages can't read secrets at runtime, so we use the deploy-time
        # token to call GitHub APIs and write the responses as static JSON
        # files into dist/data/repos/<owner>/<repo>/*.json. The client reads
        # those files in production (no PAT needed in the browser).
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "⚠️  GH_PAT_TOKEN secret not set — dashboard will deploy without live data."
            exit 0
          fi
          npm run prefetch-dashboard-data -- dist/data
        continue-on-error: true

      - name: Copy Coverage & Docs
        continue-on-error: true
        run: |
          cp -r docs/coverage dist/coverage 2>/dev/null || echo "No coverage found"
          cp -r docs dist/docs 2>/dev/null || echo "No docs found"
          rm -rf dist/docs/coverage 2>/dev/null || true

      - name: Upload Dashboard Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-dashboard:
    name: Deploy to GitHub Pages
    needs: build-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Dashboard URL
        run: |
          echo "🚀 Dashboard deployed to: ${{ steps.deployment.outputs.page_url }}"
