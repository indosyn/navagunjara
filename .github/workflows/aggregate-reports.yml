name: Aggregate Test Reports

on:
  # Run daily at 2 AM UTC (after all scheduled repo tests complete)
  # - voyage-data & copilot-studio run at 10:30 PM UTC
  # - dg-test-suite runs at 00:30 AM UTC
  # - siebel & cruising-power are manual only
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send email report'
        required: false
        default: 'true'
        type: boolean
      dry_run:
        description: 'Dry run mode (no emails sent)'
        required: false
        default: 'false'
        type: boolean
      extra_email:
        description: 'Additional email recipient (comma-separated @rccl.com)'
        required: false
        default: ''
        type: string

jobs:
  aggregate-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Verify SMTP Configuration
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          echo "📧 Checking SMTP configuration..."
          echo "   SMTP_HOST: $([ -n \"$SMTP_HOST\" ] && echo '✅ set' || echo '❌ missing')"
          echo "   SMTP_PORT: $([ -n \"$SMTP_PORT\" ] && echo '✅ set' || echo '❌ missing')"
          echo "   SMTP_USER: $([ -n \"$SMTP_USER\" ] && echo '✅ set' || echo '❌ missing')"
          echo "   SMTP_PASS: $([ -n \"$SMTP_PASS\" ] && echo '✅ set' || echo '❌ missing')"
          echo "   EMAIL_TO: $([ -n \"$EMAIL_TO\" ] && echo '✅ set' || echo '❌ missing')"
          echo "   EMAIL_FROM: $([ -n \"$EMAIL_FROM\" ] && echo '✅ set' || echo '❌ missing')"

      - name: Generate and Send Report
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EXTRA_EMAIL: ${{ github.event.inputs.extra_email }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "🚀 Starting report generation..."
          echo "   Send email: ${{ github.event.inputs.send_email }}"
          echo "   Dry run: ${{ github.event.inputs.dry_run }}"
          echo ""
          
          # Append extra_email to EMAIL_TO if provided
          if [ -n "$EXTRA_EMAIL" ]; then
            export EMAIL_TO="${EMAIL_TO},${EXTRA_EMAIL}"
            echo "   Extra recipient: $EXTRA_EMAIL"
          fi
          
          if [ "${{ github.event.inputs.send_email }}" = "false" ]; then
            echo "📄 Running in generate-only mode..."
            npm run generate-report
          else
            echo "📧 Running with email sending enabled..."
            npm start
          fi

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: output/*.html
          retention-days: 30
      
      - name: Report Generation Summary
        if: always()
        run: |
          echo "📊 Report Generation Summary"
          echo "============================"
          if [ -f output/*.html ]; then
            echo "✅ HTML report generated successfully"
            ls -la output/*.html
          else
            echo "❌ No HTML report found in output directory"
          fi
