services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: navagunjara
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-navagunjara@1630}
      POSTGRES_DB: navagunjara
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navagunjara"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://navagunjara:${POSTGRES_PASSWORD:-navagunjara@1630}@db:5432/navagunjara?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
